<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY-ROBLOX - Cosmic Vortex Edition</title>
    <style>
        /* ------------------ Base & Reset ------------------ */
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ------------------ Cosmic Vortex Background ------------------ */
        /* จำลองหลุมดำหมุนวนและแสงประกายใจกลางตามรูปภาพ */
        .vortex-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140vh;
            height: 140vh;
            transform: translate(-50%, -50%) rotate(0deg);
            background: 
                radial-gradient(circle at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.2) 2%, transparent 8%),
                radial-gradient(circle at center, transparent 30%, rgba(255,255,255,0.05) 40%, transparent 60%),
                conic-gradient(from 0deg, #000000, #111111, #222222, #0d0d0d, #1a1a1a, #000000);
            border-radius: 50%;
            z-index: 1;
            animation: vortexRotate 40s linear infinite;
            opacity: 0.85;
        }

        /* แสงประกายแฉกตรงกลางดวงดาว */
        .vortex-star-flare {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }
        .vortex-star-flare::before, .vortex-star-flare::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translate(-50%, -50%);
        }
        /* แนวนอน */
        .vortex-star-flare::before { width: 120px; height: 1px; }
        /* แนวตั้ง */
        .vortex-star-flare::after { width: 1px; height: 120px; }

        @keyframes vortexRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* ------------------ Main Card (Dark Glassmorphism) ------------------ */
        .container {
            background: rgba(5, 5, 5, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.9),
                        inset 0 0 40px rgba(255, 255, 255, 0.02);
        }

        h1 {
            color: #ffffff;
            font-size: 30px;
            font-weight: 300;
            margin: 0 0 8px 0;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 45px;
        }

        /* ------------------ Menu Buttons ------------------ */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .menu-btn.danger:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .menu-arrow {
            font-size: 10px;
            opacity: 0.3;
            transform: translateX(0);
        }
        .menu-btn:hover .menu-arrow {
            opacity: 0.8;
            transform: translateX(3px);
        }

        /* ------------------ Panels ------------------ */
        .panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-8px);
            transition: max-height 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.4s ease, 
                        transform 0.4s ease;
        }

        .panel.show {
            max-height: 500px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ------------------ Tab Control ------------------ */
        .tab-group {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: rgba(255, 255, 255, 0.3);
            border: none;
            padding: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #000000;
        }

        /* ------------------ Inputs & Labels ------------------ */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-left: 2px;
        }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            text-align: center;
            outline: none;
            letter-spacing: 1px;
        }

        .input-box:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        /* ------------------ Action Buttons ------------------ */
        .btn-action {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-1px);
        }

        /* ------------------ Key Display Box ------------------ */
        .key-display-box {
            display: none;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.3);
            padding: 18px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            color: #ffffff;
            cursor: pointer;
            word-break: break-all;
            animation: fadeIn 0.4s ease;
            letter-spacing: 0.5px;
        }

        .key-display-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #ffffff;
        }

        .copy-tip {
            display: none;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 12px;
            letter-spacing: 1px;
            animation: fadeIn 0.4s ease;
        }

        /* ------------------ Support Panel ------------------ */
        .support-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 22px;
        }

        .discord-title {
            color: #ffffff;
            font-weight: 400;
            font-size: 16px;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .support-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-discord {
            flex: 2;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .btn-discord:hover { background: #ffffff; color: #000000; }

        .btn-copy-link {
            flex: 1;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-copy-link:hover { border-color: rgba(255, 255, 255, 0.4); color: #ffffff; }

        /* ------------------ Ban Panel & Search ------------------ */
        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box {
            flex: 2;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
        }
        .search-box:focus { border-color: rgba(255, 255, 255, 0.3); }

        .btn-search {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-search:hover { background: #ffffff; color: #000000; }

        .result-box {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 22px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        .result-item {
            margin-bottom: 14px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-bottom: 8px;
        }

        .result-label { color: rgba(255, 255, 255, 0.4); }
        .result-value { font-weight: 400; color: #ffffff; word-break: break-all; max-width: 70%; text-align: right; }
        .result-value.active-status { color: #ffffff; font-weight: 600; }
        .result-value.banned-status { color: rgba(255, 255, 255, 0.3); text-decoration: line-through; }

        .btn-ban-action {
            width: 100%;
            background: transparent;
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .btn-ban-action:hover:not(:disabled) { background: #ff3b30; color: #ffffff; border-color: #ff3b30; }
        .btn-ban-action:disabled { background: transparent; color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.05); cursor: not-allowed; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- เอฟเฟกต์พื้นหลังดาวหมุนวนตามรูปภาพที่ส่งมา -->
<div class="vortex-bg">
    <div class="vortex-star-flare"></div>
</div>

<div class="container">
    <h1>PROXY-ROBLOX</h1>
    <div class="subtitle">Cosmic Minimalist System</div>
    
    <!-- เมนูหลัก -->
    <div class="main-menu">
        <button class="menu-btn" onclick="togglePanel('keyPanel')">
            <span>KEY SYSTEM</span>
            <span class="menu-arrow">▶</span>
        </button>
        
        <button class="menu-btn" onclick="togglePanel('supportPanel')">
            <span>SUPPORT COMMUNITY</span>
            <span class="menu-arrow">▶</span>
        </button>
        
        <button class="menu-btn danger" onclick="togglePanel('banPanel')">
            <span>BAN PANEL</span>
            <span class="menu-arrow">▶</span>
        </button>
    </div>

    <!-- แผงระบบคีย์ -->
    <div class="panel" id="keyPanel">
        <div class="tab-group">
            <button class="tab-btn active" id="btnDay" onclick="setMode('day')">DAY</button>
            <button class="tab-btn" id="btnMonth" onclick="setMode('month')">MONTH</button>
        </div>

        <div class="input-group">
            <label id="inputLabel">ระบุจำนวนวัน (1 - 15 วัน):</label>
            <input type="number" id="numInput" class="input-box" min="1" max="15" value="1" oninput="validateInput(this)">
        </div>
        
        <button class="btn-action" onclick="generateKey()">GENERATE KEY</button>
        
        <div class="key-display-box" id="keyBox" onclick="copyToClipboard()"></div>
        <div class="copy-tip" id="copyTip">TAP TO COPY KEY</div>
    </div>

    <!-- แผงติดต่อทีมงาน -->
    <div class="panel" id="supportPanel">
        <div class="support-box">
            <div class="discord-title">PROXY COMMUNITY</div>
            <p style="font-size: 12px; color: rgba(255,255,255,0.4); margin: 0 0 15px 0; letter-spacing: 0.5px;">พบเจอบั๊ก หรือต้องการความช่วยเหลือ? เข้าร่วมเซิร์ฟเวอร์ดิสคอร์ดของเรา</p>
            <div class="support-btn-group">
                <button class="btn-discord" onclick="openDiscord()">JOIN DISCORD</button>
                <button class="btn-copy-link" onclick="copyDiscordLink()">COPY</button>
            </div>
        </div>
    </div>

    <!-- แผงระบบแบนคีย์ -->
    <div class="panel" id="banPanel">
        <div class="search-group">
            <input type="text" id="searchKeyInput" class="search-box" placeholder="กรอกชื่อคีย์ที่ต้องการค้นหา...">
            <button class="btn-search" onclick="searchKey()">SEARCH</button>
        </div>

        <!-- ผลลัพธ์การค้นหา -->
        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span class="result-label">KEY</span>
                <span class="result-value" id="resKeyName">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">TIME LEFT</span>
                <span class="result-value" id="resTimeLeft">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">STATUS</span>
                <span class="result-value" id="resStatus">-</span>
            </div>
            <button class="btn-ban-action" id="banActionBtn" onclick="executeBan()">BAN THIS KEY</button>
        </div>
    </div>
</div>

<script>
    let currentMode = 'day';
    const discordURL = "https://discord.gg/6aCDxfR7br";

    let mockKeyDatabase = {
        "proxy-roblox-1day-qdvkj": { timeLeft: "1 วัน 0 ชั่วโมง", status: "ใช้งานได้ปกติ" },
        "proxy-roblox-3month-abcde": { timeLeft: "3 เดือน 0 วัน", status: "ใช้งานได้ปกติ" }
    };
    
    let activeSearchedKey = "";

    function togglePanel(panelId) {
        const panels = ['keyPanel', 'supportPanel', 'banPanel'];
        panels.forEach(id => {
            const p = document.getElementById(id);
            if (id === panelId) {
                p.classList.toggle('show');
            } else {
                p.classList.remove('show');
            }
        });
    }

    function searchKey() {
        const inputVal = document.getElementById('searchKeyInput').value.trim().toLowerCase();
        const resultBox = document.getElementById('resultBox');
        
        if(!inputVal) {
            alert("❌ กรุณากรอกคีย์ที่ต้องการค้นหาครับ");
            return;
        }

        if(mockKeyDatabase[inputVal]) {
            activeSearchedKey = inputVal;
            updateResultUI(inputVal, mockKeyDatabase[inputVal]);
            resultBox.style.display = 'block';
        } else {
            resultBox.style.display = 'none';
            activeSearchedKey = "";
            alert("❌ ไม่พบข้อมูลคีย์นี้ในระบบฐานข้อมูล");
        }
    }

    function updateResultUI(key, data) {
        document.getElementById('resKeyName').innerText = key;
        document.getElementById('resTimeLeft').innerText = data.timeLeft;
        
        const statusEl = document.getElementById('resStatus');
        const banBtn = document.getElementById('banActionBtn');
        
        statusEl.innerText = data.status;
        
        if(data.status === "ถูกแบน (BANNED)") {
            statusEl.className = "result-value banned-status";
            banBtn.disabled = true;
            banBtn.innerText = "BANNED";
        } else {
            statusEl.className = "result-value active-status";
            banBtn.disabled = false;
            banBtn.innerText = "BAN THIS KEY";
        }
    }

    function executeBan() {
        if(!activeSearchedKey || !mockKeyDatabase[activeSearchedKey]) return;

        if(confirm(`⚠️ ยืนยันคำสั่งแบนคีย์: ${activeSearchedKey}?`)) {
            mockKeyDatabase[activeSearchedKey].status = "ถูกแบน (BANNED)";
            mockKeyDatabase[activeSearchedKey].timeLeft = "0 นาที";
            
            updateResultUI(activeSearchedKey, mockKeyDatabase[activeSearchedKey]);
            alert(`ทำรายการสั่งแบนคีย์สำเร็จแล้ว`);
        }
    }

    function openDiscord() { window.open(discordURL, '_blank'); }

    function copyDiscordLink() {
        navigator.clipboard.writeText(discordURL).then(() => {
            alert("📋 คัดลอกลิงก์ Discord แล้ว");
        });
    }

    function setMode(mode) {
        currentMode = mode;
        const btnDay = document.getElementById('btnDay');
        const btnMonth = document.getElementById('btnMonth');
        const inputLabel = document.getElementById('inputLabel');
        const numInput = document.getElementById('numInput');

        if(mode === 'day') {
            btnDay.classList.add('active');
            btnMonth.classList.remove('active');
            inputLabel.innerText = "ระบุจำนวนวัน (1 - 15 วัน):";
            numInput.max = 15;
            numInput.value = "1";
        } else {
            btnMonth.classList.add('active');
            btnDay.classList.remove('active');
            inputLabel.innerText = "ระบุจำนวนเดือน (1 - 12 เดือน):";
            numInput.max = 12;
            numInput.value = "1";
        }
    }

    function validateInput(input) {
        let val = parseInt(input.value);
        let maxLimit = currentMode === 'day' ? 15 : 12;
        if (val > maxLimit) input.value = maxLimit;
        if (val < 1) input.value = 1;
        if (isNaN(val)) input.value = "";
    }

    function generateKey() {
        const numInput = document.getElementById('numInput');
        let amount = numInput.value || 1;
        let maxLimit = currentMode === 'day' ? 15 : 12;
        if (amount > maxLimit) amount = maxLimit;
        if (amount < 1) amount = 1;

        const characters = 'abcdefghijklmnopqrstuvwxyz';
        let randomStr = '';
        for (let i = 0; i < 5; i++) {
            randomStr += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        
        let suffix = (currentMode === 'day') ? `${amount}day` : `${amount}month`;
        const generatedKey = `proxy-roblox-${suffix}-${randomStr}`;
        
        mockKeyDatabase[generatedKey] = {
            timeLeft: currentMode === 'day' ? `${amount} วัน 0 ชั่วโมง` : `${amount} เดือน 0 วัน`,
            status: "ใช้งานได้ปกติ"
        };

        const keyBox = document.getElementById('keyBox');
        const copyTip = document.getElementById('copyTip');
        keyBox.innerText = generatedKey;
        keyBox.style.display = 'block';
        copyTip.style.display = 'block';
    }

    document.getElementById('searchKeyInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { searchKey(); }
    });

    function copyToClipboard() {
        const keyText = document.getElementById('keyBox').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            alert("📋 คัดลอกคีย์เรียบร้อยแล้ว");
        });
    }
</script>

</body>
</html>
