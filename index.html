<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY-ROBLOX - Premium Cyber System</title>
    <style>
        /* ------------------ Base & Reset ------------------ */
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            background: radial-gradient(circle at 50% 50%, #0a0a16 0%, #020205 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Custom Scrollbar ให้ดูเท่เข้าธีม */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #05050f; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 10px; }

        /* ------------------ Main Card Container ------------------ */
        .container {
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 28px;
            padding: 45px 35px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 243, 255, 0.1),
                        inset 0 0 20px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* เส้นแสงวิ่งด้านบนสุดของการ์ด */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; width: 70%; height: 2px;
            background: linear-gradient(90deg, transparent, #00f3ff, #ff0055, transparent);
            box-shadow: 0 0 15px #00f3ff;
        }

        h1 {
            background: linear-gradient(135deg, #00f3ff 0%, #b800ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 5px 0;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.3));
        }

        .subtitle {
            color: #555577;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
            font-weight: 700;
        }

        /* ------------------ Main Menu Buttons ------------------ */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 18px 22px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.08), transparent);
            transition: 0.5s;
        }

        .menu-btn:hover::before { left: 100%; }

        .menu-btn:hover {
            background: rgba(0, 243, 255, 0.05);
            border-color: #00f3ff;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            transform: translateY(-2px);
        }

        .menu-btn.danger {
            border-color: rgba(255, 0, 85, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .menu-btn.danger:hover {
            background: rgba(255, 0, 85, 0.05);
            border-color: #ff0055;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
        }

        .menu-arrow {
            font-size: 12px;
            opacity: 0.5;
            transform: translateX(0);
        }
        .menu-btn:hover .menu-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* ------------------ Panels (เปิด-ปิด แบบสมูธสไลด์) ------------------ */
        .panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.4s ease, 
                        transform 0.4s ease;
        }

        .panel.show {
            max-height: 500px; /* ขยายความสูงเปิดรับข้อมูล */
            opacity: 1;
            transform: translateY(0);
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        /* ------------------ Tab Control ------------------ */
        .tab-group {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: #666688;
            border: none;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00f3ff 0%, #0066ff 100%);
            color: #020205;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
        }

        /* ------------------ Inputs & Labels ------------------ */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: #00f3ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        .input-box:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        /* ------------------ Buttons (Action) ------------------ */
        .btn-action {
            background: linear-gradient(135deg, #00f3ff 0%, #0066ff 100%);
            color: #020205;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.25);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 243, 255, 0.45);
        }

        /* ------------------ Key Display Box ------------------ */
        .key-display-box {
            display: none;
            margin-top: 25px;
            background: rgba(255, 0, 85, 0.03);
            border: 1px dashed #ff0055;
            padding: 18px;
            border-radius: 14px;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            color: #ff0055;
            font-weight: 700;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.3);
            word-break: break-all;
            animation: fadeIn 0.4s ease;
        }

        .key-display-box:hover {
            background: rgba(255, 0, 85, 0.08);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.15);
        }

        .copy-tip {
            display: none;
            font-size: 11px;
            color: #444466;
            margin-top: 12px;
            letter-spacing: 1px;
            animation: fadeIn 0.4s ease;
        }

        /* ------------------ Support Panel ------------------ */
        .support-box {
            background: rgba(88, 101, 242, 0.03);
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 16px;
            padding: 22px;
        }

        .discord-title {
            color: #5865F2;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .support-btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .btn-discord {
            flex: 2;
            background: #5865F2;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-discord:hover { background: #4752C4; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3); }

        .btn-copy-link {
            flex: 1;
            background: transparent;
            color: #00f3ff;
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-copy-link:hover { background: rgba(0, 243, 255, 0.08); border-color: #00f3ff; transform: translateY(-2px); }

        /* ------------------ Ban Panel & Search ------------------ */
        .search-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box {
            flex: 2;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 0, 85, 0.2);
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .search-box:focus { border-color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.15); }

        .btn-search {
            flex: 1;
            background: #ff0055;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.2);
        }
        .btn-search:hover { background: #d60048; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 0, 85, 0.35); }

        .result-box {
            display: none;
            background: rgba(15, 5, 10, 0.6);
            border: 1px solid rgba(255, 0, 85, 0.15);
            border-radius: 16px;
            padding: 22px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        .result-item {
            margin-bottom: 14px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 8px;
        }

        .result-label { color: #666688; }
        .result-value { font-weight: 600; color: #ffffff; word-break: break-all; max-width: 70%; text-align: right; }
        .result-value.active-status { color: #00ff66; text-shadow: 0 0 8px rgba(0,255,102,0.3); }
        .result-value.banned-status { color: #ff0055; text-shadow: 0 0 8px rgba(255,0,85,0.3); }

        .btn-ban-action {
            width: 100%;
            background: linear-gradient(135deg, #ff0055 0%, #a30036 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.2);
        }
        .btn-ban-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 0, 85, 0.4); }
        .btn-ban-action:disabled { background: #222233; color: #555566; border: 1px solid #333344; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PROXY-ROBLOX</h1>
    <div class="subtitle">Premium Cyber System</div>
    
    <!-- เมนูหลัก -->
    <div class="main-menu">
        <button class="menu-btn" onclick="togglePanel('keyPanel')">
            <span>🔑 ระบบจัดการคีย์ (KEY SYSTEM)</span>
            <span class="menu-arrow">▶</span>
        </button>
        
        <button class="menu-btn" onclick="togglePanel('supportPanel')">
            <span>💬 ติดต่อทีมงาน (SUPPORT COMMUNITY)</span>
            <span class="menu-arrow">▶</span>
        </button>
        
        <button class="menu-btn danger" onclick="togglePanel('banPanel')">
            <span>🚫 ระบบแบนคีย์ผู้ใช้งาน (BAN PANEL)</span>
            <span class="menu-arrow">▶</span>
        </button>
    </div>

    <!-- แผงระบบคีย์ -->
    <div class="panel" id="keyPanel">
        <div class="tab-group">
            <button class="tab-btn active" id="btnDay" onclick="setMode('day')">📅 รายวัน (DAY)</button>
            <button class="tab-btn" id="btnMonth" onclick="setMode('month')">🌙 รายเดือน (MONTH)</button>
        </div>

        <div class="input-group">
            <label id="inputLabel">ระบุจำนวนวัน (1 - 15 วัน):</label>
            <input type="number" id="numInput" class="input-box" min="1" max="15" value="1" oninput="validateInput(this)">
        </div>
        
        <button class="btn-action" onclick="generateKey()">⚡ GENERATE KEY</button>
        
        <div class="key-display-box" id="keyBox" onclick="copyToClipboard()"></div>
        <div class="copy-tip" id="copyTip">✨ แตะที่กล่องด้านบนเพื่อคัดลอกคีย์อัตโนมัติ ✨</div>
    </div>

    <!-- แผงติดต่อทีมงาน -->
    <div class="panel" id="supportPanel">
        <div class="support-box">
            <div class="discord-title">PROXY COMMUNITY</div>
            <p style="font-size: 13px; color: #666688; margin: 0 0 15px 0;">พบเจอบั๊ก หรือต้องการความช่วยเหลือ? เข้าร่วมเซิร์ฟเวอร์ดิสคอร์ดของเรา</p>
            <div class="support-btn-group">
                <button class="btn-discord" onclick="openDiscord()">🚀 เข้าสู่ Discord</button>
                <button class="btn-copy-link" onclick="copyDiscordLink()">📋 COPY</button>
            </div>
        </div>
    </div>

    <!-- แผงระบบแบนคีย์ -->
    <div class="panel" id="banPanel">
        <div class="search-group">
            <input type="text" id="searchKeyInput" class="search-box" placeholder="กรอกชื่อคีย์ที่ต้องการค้นหา...">
            <button class="btn-search" onclick="searchKey()">🔍 ค้นหา</button>
        </div>

        <!-- ผลลัพธ์การค้นหา -->
        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span class="result-label">คีย์</span>
                <span class="result-value" id="resKeyName">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">เวลาคงเหลือ</span>
                <span class="result-value" id="resTimeLeft">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">สถานะระบบ</span>
                <span class="result-value" id="resStatus">-</span>
            </div>
            <button class="btn-ban-action" id="banActionBtn" onclick="executeBan()">🚫 สั่งระงับการใช้งานคีย์นี้ (BAN)</button>
        </div>
    </div>
</div>

<script>
    let currentMode = 'day';
    const discordURL = "https://discord.gg/6aCDxfR7br";

    // ฐานข้อมูลจำลองรองรับตัวพิมพ์เล็กตามตัวอย่าง
    let mockKeyDatabase = {
        "proxy-roblox-1day-qdvkj": { timeLeft: "1 วัน 0 ชั่วโมง", status: "ใช้งานได้ปกติ" },
        "proxy-roblox-3month-abcde": { timeLeft: "3 เดือน 0 วัน", status: "ใช้งานได้ปกติ" }
    };
    
    let activeSearchedKey = "";

    function togglePanel(panelId) {
        const panels = ['keyPanel', 'supportPanel', 'banPanel'];
        panels.forEach(id => {
            const p = document.getElementById(id);
            if (id === panelId) {
                p.classList.toggle('show');
            } else {
                p.classList.remove('show');
            }
        });
    }

    function searchKey() {
        const inputVal = document.getElementById('searchKeyInput').value.trim().toLowerCase();
        const resultBox = document.getElementById('resultBox');
        
        if(!inputVal) {
            alert("❌ กรุณากรอกคีย์ที่ต้องการค้นหาครับ");
            return;
        }

        if(mockKeyDatabase[inputVal]) {
            activeSearchedKey = inputVal;
            updateResultUI(inputVal, mockKeyDatabase[inputVal]);
            resultBox.style.display = 'block';
        } else {
            resultBox.style.display = 'none';
            activeSearchedKey = "";
            alert("❌ ไม่พบข้อมูลคีย์นี้ในระบบฐานข้อมูล");
        }
    }

    function updateResultUI(key, data) {
        document.getElementById('resKeyName').innerText = key;
        document.getElementById('resTimeLeft').innerText = data.timeLeft;
        
        const statusEl = document.getElementById('resStatus');
        const banBtn = document.getElementById('banActionBtn');
        
        statusEl.innerText = data.status;
        
        if(data.status === "ถูกแบน (BANNED)") {
            statusEl.className = "result-value banned-status";
            banBtn.disabled = true;
            banBtn.innerText = "🔒 คีย์นี้ถูกระงับถาวรแล้ว";
        } else {
            statusEl.className = "result-value active-status";
            banBtn.disabled = false;
            banBtn.innerText = "🚫 สั่งระงับการใช้งานคีย์นี้ (BAN)";
        }
    }

    function executeBan() {
        if(!activeSearchedKey || !mockKeyDatabase[activeSearchedKey]) return;

        if(confirm(`⚠️ ยืนยันคำสั่งแบนคีย์: ${activeSearchedKey}?\nเมื่อแบนแล้วผู้ใช้จะไม่สามารถเข้าสู่ระบบได้อีกต่อไป`)) {
            mockKeyDatabase[activeSearchedKey].status = "ถูกแบน (BANNED)";
            mockKeyDatabase[activeSearchedKey].timeLeft = "0 นาที (หมดสิทธิ์ใช้งาน)";
            
            updateResultUI(activeSearchedKey, mockKeyDatabase[activeSearchedKey]);
            alert(`🔒 ทำการสั่งแบนคีย์ ${activeSearchedKey} สำเร็จแล้ว!`);
        }
    }

    function openDiscord() { window.open(discordURL, '_blank'); }

    function copyDiscordLink() {
        navigator.clipboard.writeText(discordURL).then(() => {
            alert("📋 คัดลอกลิงก์ Discord ไปยังคลิปบอร์ดแล้ว!");
        });
    }

    function setMode(mode) {
        currentMode = mode;
        const btnDay = document.getElementById('btnDay');
        const btnMonth = document.getElementById('btnMonth');
        const inputLabel = document.getElementById('inputLabel');
        const numInput = document.getElementById('numInput');

        if(mode === 'day') {
            btnDay.classList.add('active');
            btnMonth.classList.remove('active');
            inputLabel.innerText = "ระบุจำนวนวัน (1 - 15 วัน):";
            numInput.max = 15;
            numInput.value = "1";
        } else {
            btnMonth.classList.add('active');
            btnDay.classList.remove('active');
            inputLabel.innerText = "ระบุจำนวนเดือน (1 - 12 เดือน):";
            numInput.max = 12;
            numInput.value = "1";
        }
    }

    function validateInput(input) {
        let val = parseInt(input.value);
        let maxLimit = currentMode === 'day' ? 15 : 12;
        if (val > maxLimit) input.value = maxLimit;
        if (val < 1) input.value = 1;
        if (isNaN(val)) input.value = "";
    }

    function generateKey() {
        const numInput = document.getElementById('numInput');
        let amount = numInput.value || 1;
        let maxLimit = currentMode === 'day' ? 15 : 12;
        if (amount > maxLimit) amount = maxLimit;
        if (amount < 1) amount = 1;

        const characters = 'abcdefghijklmnopqrstuvwxyz';
        let randomStr = '';
        for (let i = 0; i < 5; i++) {
            randomStr += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        
        let suffix = (currentMode === 'day') ? `${amount}day` : `${amount}month`;
        const generatedKey = `proxy-roblox-${suffix}-${randomStr}`;
        
        mockKeyDatabase[generatedKey] = {
            timeLeft: currentMode === 'day' ? `${amount} วัน 0 ชั่วโมง` : `${amount} เดือน 0 วัน`,
            status: "ใช้งานได้ปกติ"
        };

        const keyBox = document.getElementById('keyBox');
        const copyTip = document.getElementById('copyTip');
        keyBox.innerText = generatedKey;
        keyBox.style.display = 'block';
        copyTip.style.display = 'block';
    }

    document.getElementById('searchKeyInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { searchKey(); }
    });

    function copyToClipboard() {
        const keyText = document.getElementById('keyBox').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            alert("📋 คัดลอกคีย์เรียบร้อยแล้ว!\n" + keyText);
        });
    }
</script>

</body>
</html>
